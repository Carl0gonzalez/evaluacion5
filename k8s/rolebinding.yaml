apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: promanage-role
  namespace: promanage
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: promanage-rolebinding
  namespace: promanage
subjects:
- kind: ServiceAccount
  name: promanage-sa
  namespace: promanage
roleRef:
  kind: Role
  name: promanage-role
  apiGroup: rbac.authorization.k8s.io
