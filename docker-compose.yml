version: "3.8"

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - project-service
      - budget-service
      - file-service
    environment:
      AUTH_URL: http://auth-service:3000
      PROJECT_URL: http://project-service:3000
      BUDGET_URL: http://budget-service:3000
      FILE_URL: http://file-service:3000

  auth-service:
    build: ./auth-service
    ports:
      - "3001:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: proadmin
      DB_PASS: secret
      DB_NAME: promanage

  project-service:
    build: ./project-service
    ports:
      - "3002:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: proadmin
      DB_PASS: secret
      DB_NAME: promanage

  budget-service:
    build: ./budget-service
    ports:
      - "3003:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: proadmin
      DB_PASS: secret
      DB_NAME: promanage

  file-service:
    build: ./file-service
    ports:
      - "3004:3000"
    depends_on:
      - db
      - minio
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: proadmin
      DB_PASS: secret
      DB_NAME: promanage
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: promanage-docs
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin

  db:
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: proadmin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: promanage
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  db_data:
  minio_data:
